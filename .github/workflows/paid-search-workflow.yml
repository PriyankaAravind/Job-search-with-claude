name: Daily Paid Search Job Search

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM Toronto Time (EDT)
    - cron: '0 15,20 * * *'  # 11:00 AM and 4:00 PM Toronto Time (EDT)
  workflow_dispatch:

jobs:
  search-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r job-search-jobs-only/requirements.txt

      - name: Verify secrets
        run: |
          echo "Adzuna App ID set:  $([ -n "$ADZUNA_APP_ID" ]     && echo YES || echo NO)"
          echo "Adzuna App Key set: $([ -n "$ADZUNA_APP_KEY" ]    && echo YES || echo NO)"
          echo "Gmail address set:  $([ -n "$GMAIL_ADDRESS" ]     && echo YES || echo NO)"
          echo "App password set:   $([ -n "$GMAIL_APP_PASSWORD" ]&& echo YES || echo NO)"
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Run job search
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python paid-search-jobs-only.py

      - name: Upload Excel as backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 7
